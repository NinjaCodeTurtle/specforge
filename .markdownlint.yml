# SpecForge markdownlint configuration
# Templates and documentation are intentionally content-heavy

# Disable line length — templates have long table rows and guidance comments
MD013: false

# Allow duplicate headings — needed in changelogs and template sections
MD024: false

# Allow headings without blank lines in compact sections
MD022: false

# Allow lists without blank lines after headings
MD032: false

# Allow fenced code blocks without blank lines
MD031: false

# Allow fenced code without language (used for ASCII diagrams)
MD040: false

# Allow non-H1 first heading (issue templates start with H2)
MD041: false

# Allow bare URLs in attribution sections
MD034: false

# Allow HTML comments (used for template guidance)
MD033: false

# Allow trailing punctuation in headings (used in templates)
MD026: false

# Allow non-sequential ordered list prefixes (templates use explicit numbering)
MD029: false

# Allow tables without surrounding blank lines
MD058: false

# Allow multiple H1 headings (templates have frontmatter title + doc title)
MD025: false
